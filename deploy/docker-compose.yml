services:
  chore-calendar:
    image: registry.home.lukeboyle.com/chore-calendar:${CHORE_CALENDAR_VERSION:-latest}
    container_name: chore-calendar
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-6969}:3000"
    volumes:
      - chore-data:/app/data
    environment:
      - NODE_ENV=production
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}

volumes:
  chore-data:
